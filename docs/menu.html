<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
 
<body>
 
<header>
<nav>
<h2>Patty's</h2>
<button class="hamburger" onclick="toggleMenu()">&#9776;</button>
<ul id="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="menu.html">Menu</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>
</header>
 
<h1>Menu</h1>
 
<div class="menu">
 
  <div class="item">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=900&q=80" alt="Burger">
    <h3>Burger</h3>
    <p>$7.99</p>
    <button onclick="addToCart('Burger', 7.99)">Add to Cart</button>
  </div>
 
  <div class="item">
    <img src="https://www.thecookierookie.com/wp-content/uploads/2024/07/shoestring-fries-2-of-8-edited.jpg" alt="Fries">
    <h3>Fries</h3>
    <p>$2.99</p>
    <button onclick="addToCart('Fries', 2.99)">Add to Cart</button>
  </div>
 
  <div class="item">
    <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=900&q=80" alt="Pizza">
    <h3>Pizza</h3>
    <p>$9.99</p>
    <button onclick="addToCart('Pizza', 9.99)">Add to Cart</button>
  </div>
 
  <div class="item">
    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=900&q=80" alt="Salad">
    <h3>Salad</h3>
    <p>$5.99</p>
    <button onclick="addToCart('Salad', 5.99)">Add to Cart</button>
  </div>
 
  <div class="item">
    <img src="https://images.unsplash.com/photo-1529042410759-befb1204b468?auto=format&fit=crop&w=900&q=80" alt="Chicken Sandwich">
    <h3>Chicken Sandwich</h3>
    <p>$6.99</p>
    <button onclick="addToCart('Chicken Sandwich', 6.99)">Add to Cart</button>
  </div>
 
  <div class="item">
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=900&q=80" alt="Pasta">
    <h3>Pasta</h3>
    <p>$8.99</p>
    <button onclick="addToCart('Pasta', 8.99)">Add to Cart</button>
  </div>
 
</div>
 
<section class="cart-section">
  <h2>Shopping Cart</h2>
  <div id="cart-items"></div>
  <h3 id="cart-total">Total: $0.00</h3>
  <button onclick="clearCart()">Clear Cart</button>
</section>
 
<footer>
<p>Open: Mon–Sun 10AM – 8PM</p>
<p>Follow us: Facebook | Instagram</p>
</footer>
 
</body>
</html>
